<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />

<head>
	<meta charset="utf-8">
	<title>Ajout des Produits</title>
</head>

<body>
	<div th:replace="template"></div>
	<div class="container mt-5">
		<div class="card">
			<div class="card-header" th:if="${mode=='new'}"> Ajout des Projects </div>
			<div class="card-header" th:if="${mode=='edit'}">Modification des Projects </div>
			<div class="card-body">
				<form th:action="@{saveProject}" method="post">
					<input name="page" hidden class="form-control" th:value="${page}" />
					<input name="size" hidden class="form-control" th:value="${size}" />
					<div class="form-group">
					<label class="control-label" hidden>ID Project :</label>
					<input type="hidden" name="idProject" class="form-control"
					th:value="${project.idProject}" />
					 </div>

					<div class="form-group">
						<label class="control-label">Nom Project :</label>
						<input type="text" name="nomProject" class="form-control" th:value="${project.nomProject}" />
						<span th:errors= ${project.nomProject} class="text-danger"> </span>
					</div>
					<div class="form-group">
						<label class="control-label">Nom Client :</label>
						<input type="text" name="nomClient" class="form-control" th:value="${project.nomClient}" />
						<span th:errors= ${project.nomClient} class="text-danger"> </span>
					</div>
					<div class="form-group">
						<label class="control-label">Montant Project :</label>
						<input type="text" name="montantProject" class="form-control" th:value="${project.montantProject}"/>
						<span th:errors= ${project.montantProject} class="text-danger"> </span>
					</div>
					<div class="form-group">
						<label class="control-label">Date Debut :</label>
						<input type="date" name="dateDeb" class="form-control"th:value="${project.dateDeb}" />
						<span th:errors= ${project.dateDeb} class="text-danger"> </span>
					</div>
					<div>
					<div class="form-group">
						<label class="control-label">Departement :</label>
						<select name="departement" class="form-control"
						th:value="${project.departement.idDep}"
						th:if="${!#strings.isEmpty(project.departement)}" >
						<option th:each="dep:${departements}" th:if="${mode=='edit'}"
						 th:value="${dep.idDep}" th:text="${dep.nomDep}"
						 th:selected="${ dep.idDep==project.departement.idDep}">
						</option>
						</select>
						<!-- s'il s'agit d'un ajout (mode==new) ou d'une modification d'un produit ayant une catégorie null -->
						<select name="departement" class="form-control"
						th:if="${#strings.isEmpty(project.departement)}">
						<option th:each="dep:${departements}" th:value="${dep.idDep}"
						th:text="${dep.nomDep}">
						</option>
						</select>
					</div>
						<button type="submit" class="btn btn-primary">Valider</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</body>

</html>
